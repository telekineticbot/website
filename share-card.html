<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 600px; overflow: hidden; }
  .card {
    position: relative;
    width: 1200px;
    height: 600px;
    background: linear-gradient(180deg, #dcdcd9 0%, #d6d7d3 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 80px 0 420px;
  }
  .robot {
    position: absolute;
    left: -40px;
    bottom: 0;
    height: 600px;
    width: 460px;
    object-fit: cover;
    object-position: center bottom;
    /* single radial fade, same idea as the site */
    -webkit-mask-image: radial-gradient(62% 80% at 45% 66%, #000 60%, transparent 100%);
    mask-image: radial-gradient(62% 80% at 45% 66%, #000 60%, transparent 100%);
  }
  .word {
    position: relative;
    font-family: 'Manrope', sans-serif;
    font-weight: 800;
    font-size: 72px;
    letter-spacing: 0.14em;
    color: #ff7122;
    white-space: nowrap;
  }
</style>
</head>
<body>
  <div class="card">
    <img class="robot" src="images/robot.png" alt="">
    <div class="word">TELEKINETIC</div>
  </div>
</body>
</html>
